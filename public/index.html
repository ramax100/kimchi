<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Kimchi Terminal</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;height:100dvh;overflow:hidden;background:#0c0c14}
body{display:flex;flex-direction:column}
.bar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#14141f;border-bottom:1px solid #252540;flex-shrink:0}
.bar .title{font-size:15px;font-weight:700;color:#fff}
.bar .title em{color:#c850c0;font-style:normal}
.bar .dot{width:8px;height:8px;border-radius:50%;background:#555}
.bar .dot.on{background:#4ecdc4;box-shadow:0 0 6px #4ecdc4}
#term{flex:1;min-height:0}
.btns{display:flex;gap:6px;padding:8px 10px;background:#14141f;border-top:1px solid #252540;overflow-x:auto;flex-shrink:0}
.btns::-webkit-scrollbar{display:none}
.btns button{padding:8px 12px;border-radius:8px;border:1px solid #333;background:#1e1e2e;color:#ccc;font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.btns button:active{background:#c850c0;color:#fff;border-color:#c850c0}
.btns button.g{color:#4ecdc4;border-color:#4ecdc455}
.btns button.y{color:#ffd93d;border-color:#ffd93d55}
.btns button.p{color:#ea80fc;border-color:#c850c055}
</style>
</head>
<body>
<div class="bar">
  <div class="title"><em>🥬</em> Kimchi Terminal</div>
  <div class="dot" id="dot"></div>
</div>
<div id="term"></div>
<div class="btns" id="btns">
  <button class="g" data-c="kimchi">🥬 kimchi</button>
  <button class="y" data-c="y">Yes</button>
  <button class="y" data-c="n">No</button>
  <button class="y" data-c="1">1</button>
  <button class="y" data-c="2">2</button>
  <button class="p" data-c="task">💬 Perintah</button>
  <button class="p" data-c="ferment">🧪 Ferment</button>
  <button data-c="key">🔑 API Key</button>
  <button data-c="install">⬇️ Install</button>
  <button data-c="clear">Clear</button>
</div>
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script src="app.js"></script>
</body>
</html>
