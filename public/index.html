<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Kimchi AI Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;height:100dvh;overflow:hidden;background:#0c0c14}
body{display:flex;flex-direction:column;font-family:system-ui,-apple-system,sans-serif;color:#e0e0e0}

.header{padding:12px 20px;background:#14141f;border-bottom:1px solid #252540;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header .logo{font-size:16px;font-weight:700;color:#fff}
.header .logo span{color:#c850c0}
.header button{background:#1e1e2e;color:#4ecdc4;border:1px solid #4ecdc455;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer}

.config{padding:10px 20px;background:#14141f;border-bottom:1px solid #252540;display:flex;flex-wrap:wrap;gap:8px;align-items:center;flex-shrink:0}
.config select,.config input{background:#1e1e2e;border:1px solid #333;border-radius:8px;padding:8px 12px;color:#fff;font-size:12px;outline:none}
.config select:focus,.config input:focus{border-color:#c850c0}
.config input{flex:1;min-width:120px}
.config select{min-width:100px}
.config button{background:#c850c0;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.config button:hover{background:#a040a0}
.config button:disabled{opacity:.5}

.notif{padding:8px 20px;font-size:12px;font-weight:500;text-align:center;flex-shrink:0;display:none}
.notif.success{display:block;background:#4ecdc422;color:#4ecdc4;border-bottom:1px solid #4ecdc444}
.notif.fail{display:block;background:#ff6b6b22;color:#ff6b6b;border-bottom:1px solid #ff6b6b44}

.chat{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px;min-height:0}
.chat::-webkit-scrollbar{width:4px}
.chat::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
.msg{max-width:85%;padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.6;word-wrap:break-word;white-space:pre-wrap}
.msg.user{align-self:flex-end;background:#c850c0;color:#fff;border-bottom-right-radius:4px}
.msg.ai{align-self:flex-start;background:#1e1e2e;color:#ddd;border-bottom-left-radius:4px;border:1px solid #333}
.msg.ai code{background:#0c0c14;padding:2px 6px;border-radius:4px;font-family:'Fira Code',monospace;font-size:13px}
.msg.ai pre{background:#0c0c14;padding:12px;border-radius:8px;overflow-x:auto;margin:8px 0;font-family:'Fira Code',monospace;font-size:13px;border:1px solid #333}
.msg.error{align-self:center;background:#ff6b6b22;color:#ff6b6b;border:1px solid #ff6b6b44;font-size:12px;max-width:90%}
.msg.system{align-self:center;color:#666;font-size:12px;text-align:center}
.typing{align-self:flex-start;padding:12px;color:#888;font-size:13px}
.typing span{animation:blink 1.5s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}

.input-bar{padding:12px 16px;background:#14141f;border-top:1px solid #252540;display:flex;gap:8px;flex-shrink:0}
.input-bar textarea{flex:1;background:#1e1e2e;border:1px solid #333;border-radius:12px;padding:12px 16px;color:#fff;font-size:14px;font-family:inherit;resize:none;outline:none;min-height:44px;max-height:120px}
.input-bar textarea:focus{border-color:#c850c0}
.input-bar textarea::placeholder{color:#666}
.input-bar button{background:#c850c0;color:#fff;border:none;border-radius:12px;padding:12px 20px;font-size:14px;font-weight:600;cursor:pointer;flex-shrink:0}
.input-bar button:disabled{background:#333;color:#666;cursor:not-allowed}
</style>
</head>
<body>

<div class="header">
  <div class="logo"><span>🥬</span> Kimchi AI</div>
  <button id="btn-clear">Clear</button>
</div>

<div class="config">
  <select id="provider">
    <option value="kimchi">Kimchi</option>
    <option value="openai">OpenAI</option>
    <option value="openrouter">OpenRouter</option>
    <option value="custom">Custom URL</option>
  </select>
  <input type="password" id="api-key" placeholder="API Key" autocomplete="off">
  <input type="text" id="custom-url" placeholder="Base URL (jika Custom)" style="display:none">
  <button id="btn-connect">Koneksi</button>
</div>

<div class="notif" id="notif"></div>

<div class="chat" id="chat">
  <div class="msg system">Pilih provider, masukkan API Key, tekan Koneksi.</div>
  <div class="msg system">Kimchi Key: app.kimchi.dev | OpenAI: platform.openai.com | OpenRouter: openrouter.ai</div>
</div>

<div class="input-bar">
  <textarea id="input" placeholder="Ketik perintah coding..." rows="1"></textarea>
  <button id="btn-send">Kirim</button>
</div>

<script src="app.js"></script>
</body>
</html>
