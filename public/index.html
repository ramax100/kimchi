<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Kimchi Terminal</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;height:100dvh;overflow:hidden;background:#0c0c14}
body{display:flex;flex-direction:column;font-family:system-ui,sans-serif}

.bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;background:#14141f;border-bottom:1px solid #252540;flex-shrink:0;
}
.bar .logo{font-size:15px;font-weight:700;color:#fff}
.bar .logo span{color:#c850c0}
.bar .dot{width:8px;height:8px;border-radius:50%;background:#555}
.bar .dot.on{background:#4ecdc4;box-shadow:0 0 6px #4ecdc4}

#term{flex:1;min-height:0;overflow:hidden}

.btns{
  display:flex;gap:6px;padding:10px 12px;
  background:#14141f;border-top:1px solid #252540;
  overflow-x:auto;flex-shrink:0;
}
.btns::-webkit-scrollbar{display:none}
.btns button{
  padding:9px 14px;border-radius:8px;border:1px solid #333;
  background:#1e1e2e;color:#ccc;font-size:13px;cursor:pointer;
  white-space:nowrap;flex-shrink:0;font-family:inherit;
}
.btns button:active{background:#c850c0;color:#fff;border-color:#c850c0}
.btns button.g{border-color:#4ecdc455;color:#4ecdc4}
.btns button.p{border-color:#c850c055;color:#ea80fc}
.btns button.y{border-color:#ffd93d55;color:#ffd93d}
</style>
</head>
<body>

<div class="bar">
  <div class="logo"><span>🥬</span> Kimchi Terminal</div>
  <div class="dot" id="dot"></div>
</div>

<div id="term"></div>

<div class="btns" id="btns">
  <button class="g" data-c="run">🥬 Kimchi</button>
  <button class="y" data-c="yes">Yes</button>
  <button class="y" data-c="no">No</button>
  <button class="y" data-c="1">1</button>
  <button class="y" data-c="2">2</button>
  <button class="p" data-c="task">💬 Perintah</button>
  <button class="p" data-c="ferment">🧪 Ferment</button>
  <button data-c="install">⬇️ Install</button>
  <button data-c="key">🔑 Key</button>
  <button data-c="clear">Clear</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script src="app.js"></script>
</body>
</html>
