<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kimchi Terminal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d0d0d;--bg2:#1a1a2e;--accent:#c850c0;--accent2:#ff6b6b;--green:#4ecdc4;--text:#e0e0e0;--muted:#5a6380;--border:#2d2d4a;--yellow:#ffd93d}
body{background:var(--bg);color:var(--text);height:100vh;font-family:'JetBrains Mono','Fira Code','SF Mono',monospace;display:flex;flex-direction:column;overflow:hidden}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--bg2);border-bottom:1px solid var(--border)}
.header-left{display:flex;align-items:center;gap:10px}
.logo-icon{font-size:22px}.logo-text{font-size:15px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.status{display:flex;align-items:center;gap:6px;padding:4px 12px;background:rgba(78,205,196,.1);border:1px solid rgba(78,205,196,.3);border-radius:20px;font-size:11px;color:var(--green)}
.dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.terminal{flex:1;padding:16px 20px;overflow-y:auto;cursor:text;line-height:1.6;font-size:14px}
.terminal:focus{outline:none}.terminal .line{white-space:pre-wrap;word-break:break-all}
.terminal .error{color:var(--accent2)}.terminal .info{color:var(--green)}.terminal .warn{color:var(--yellow)}.terminal .accent{color:var(--accent)}.terminal .muted{color:var(--muted)}
.terminal .cursor{display:inline-block;width:8px;height:16px;background:var(--accent);animation:blink 1s step-end infinite;vertical-align:middle;margin-left:1px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.footer{display:flex;align-items:center;justify-content:center;gap:8px;padding:8px 20px;background:var(--bg2);border-top:1px solid var(--border);font-size:11px;color:var(--muted)}
.footer b{color:var(--green)}.sep{color:var(--border)}
.terminal::-webkit-scrollbar{width:6px}.terminal::-webkit-scrollbar-track{background:var(--bg)}.terminal::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<header class="header"><div class="header-left"><span class="logo-icon">&#x1F96C;</span><span class="logo-text">Kimchi Terminal</span></div><div class="status"><span class="dot"></span><span>Ready</span></div></header>
<div class="terminal" id="terminal" tabindex="0"></div>
<footer class="footer"><span>Kimchi Terminal v1.0.0</span><span class="sep">|</span><span>Type <b>help</b> for commands</span></footer>
<script src="app.js"></script>
</body>
</html>
